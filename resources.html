                <button class="articles-item-btn" onclick="showArticlePopup('22 April 2025','Globally, more than 500 million people live with diabetes and over 6 million died from diabetes-related complications in the year 2021. Furthermore, the number of people living with diabetes is projected to increase by over 90% in sub-Saharan Africa by 2030')">

                <button class="article-item-btn" onclick="showArticlePopup('30 September 2025','High blood pressure (BP) is prevalent and uncontrolled in many low‐ and middle‐income countries (LMICs). Uncontrolled BP causes cardiovascular diseases (CVDs) and kidney disease. The high morbidity and mortality caused by uncontrolled BP results in high health expenditures for families and governments. Knowledge of the barriers to BP control may help in crafting suitable interventions. The aim of this study was to explore the barriers to BP control among patients who were on treatment for high BP in public clinics in Gaborone, Botswana')">

                    <p>High blood pressure (BP) is prevalent and uncontrolled in many low‐ and middle‐income countries (LMICs). Uncontrolled BP causes cardiovascular diseases (CVDs) and kidney disease. The high morbidity and mortality caused by uncontrolled BP results in high health expenditures for families and governments. Knowledge of the barriers to BP control may help in crafting suitable interventions. The aim of this study was to explore the barriers to BP control among patients who were on treatment for high BP in public clinics in Gaborone, Botswana</p>
